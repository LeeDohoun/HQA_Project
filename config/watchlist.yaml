# ==========================================
# HQA Autonomous Agent — 감시 종목 설정
# ==========================================

# ── 분석 스케줄 ──
schedule:
  enabled: true
  interval_minutes: 60          # 분석 주기 (분)
  market_hours_only: true       # 장중(09:00~15:30)에만 실행
  timezone: "Asia/Seoul"

# ── 전략별 스케줄 (옵션) ──
# 이 블록이 존재하면 run_loop()는 아래 전략 스케줄을 우선 사용합니다.
strategy_schedule:
  short:
    enabled: true
    interval_minutes: 60         # 단기: 장중 60분 주기
    market_hours_only: true
  long:
    enabled: true
    analysis_time: "08:00"       # 장기: 08:00에 1회 분석/플랜 생성
    market_hours_only: true       # 트리거 집행은 장중만
    check_interval_minutes: 5     # 장중 목표가 충족 체크 주기
    buy_trigger_pct: -1.0         # 분석 시점가 대비 -1.0% 도달 시 매수 트리거
    sell_trigger_pct: 1.0         # 분석 시점가 대비 +1.0% 도달 시 매도 트리거
    plan_ttl_hours: 24            # 플랜 만료 시간

# ── 감시 종목 ──
watchlist:
  - name: "삼성전자"
    code: "005930"
    mode: "full"               # "full" | "quick"
    strategy: "short"          # "short" | "long" | "both"
    priority: 1

  - name: "SK하이닉스"
    code: "000660"
    mode: "full"
    strategy: "long"
    priority: 2

  # - name: "NAVER"
  #   code: "035420"
  #   mode: "quick"
  #   priority: 3

# ── 매매 설정 ──
trading:
  enabled: false               # true로 변경 시 자동 주문 판단 실행
  dry_run: true                # true면 주문 시뮬레이션만 (로그만 남김)
  account_type: "paper"        # "paper" (KIS 모의투자) | "real" (실전)
  order_type: "limit"          # "limit" (지정가) | "market" (시장가)
  allow_real_trading: false    # 실전 주문은 이 값을 true로 명시해야 허용

  # 리스크 제한 (서킷 브레이커)
  max_daily_buy_amount: 1000000    # 일일 최대 매수 금액 (원)
  max_position_ratio: 0.25          # 종목당 최대 비중 (25%)
  stop_loss_pct: 10                 # 손절 기준 (%)
  cooldown_minutes: 30              # 동일 종목 재주문 대기 (분)

  # 자동 매수 조건 (FinalDecision 기반)
  auto_buy_conditions:
    min_total_score: 70              # 종합 점수 최소값
    min_confidence: 60               # 확신도 최소값
    allowed_actions:                  # 허용 투자 행동
      - "STRONG_BUY"
      - "BUY"
    max_risk_level: "MEDIUM"         # 최대 허용 리스크

  # 자동 매도 조건
  auto_sell_conditions:
    max_total_score: 30
    allowed_actions:
      - "SELL"
      - "STRONG_SELL"
    # 주도주 추세 보존형 기본값
    take_profit_pct: 0            # 0이면 비활성(강제 익절 안 함)
    trailing_stop_pct: 12         # 고점 대비 12% 하락 시 청산
    time_stop_minutes: 0          # 0이면 비활성(시간 강제청산 안 함)
    # 리스크 기반 트리거(과민반응 방지형)
    max_risk_level: "VERY_HIGH"   # 이보다 높아질 수 없으므로 기본은 비활성에 가까움
    confidence_drop_pct: 30       # 직전 기준 대비 30p 급락 시 리스크 트리거
    volatility_spike_pct: 0       # 0이면 비활성(옵션)

  # 신호 품질 Shadow Penalty 필터 (초기: 차단 없이 점수 페널티/리포트)
  signal_quality:
    enabled: false
    mode: "shadow_penalty"
    apply_scopes: ["short", "long"]
    report_only: false
    penalty_weights:
      low_trading_value: 8.0
      high_volatility: 6.0
      weak_return_5d: 4.0
      weak_return_20d: 4.0
      below_trend_150d: 7.0
      weak_breadth: 5.0
      missing_data: 6.0
    thresholds:
      min_avg_trading_value_20d: 1000000000
      max_volatility_20d: 0.045
      min_return_5d: -0.02
      min_return_20d: -0.05
      min_trend_150d: 1.0
      min_breadth_ratio: 0.45

# ── 트레이싱 ──
tracing:
  debug: false
  traces_dir: "./data/traces"

# ── 알림 (향후 확장) ──
notification:
  enabled: false
  # webhook_url: "https://hooks.slack.com/..."
